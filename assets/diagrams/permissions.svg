<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="graphics-document document" aria-labelledby="chart-title-container" aria-describedby="chart-desc-container">
  <title id="chart-title-container">Permission and human-approval flow</title>
  <desc id="chart-desc-container">Common local tools may proceed, ordinary shell and MCP operations ask, external directories ask, repeated doom loops are denied, and external effects remain human decisions.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .box { fill: #fff; stroke: #334155; stroke-width: 2; rx: 14; }
      .decision { fill: #f8fafc; stroke: #334155; stroke-width: 2; }
      .allow { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 14; }
      .ask { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 14; }
      .deny { fill: #fef2f2; stroke: #b91c1c; stroke-width: 2; rx: 14; }
      .line { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }
      .label { font: 600 17px system-ui, sans-serif; fill: #0f172a; text-anchor: middle; }
      .small { font: 500 14px system-ui, sans-serif; fill: #475569; text-anchor: middle; }
    </style>
  </defs>

  <rect class="box" x="55" y="55" width="230" height="70"/>
  <text class="label" x="170" y="87">Requested action</text>
  <text class="small" x="170" y="109">tool, command or effect</text>

  <path class="decision" d="M 455 40 L 585 90 L 455 140 L 325 90 Z"/>
  <text class="label" x="455" y="86">Classify effect</text>
  <text class="small" x="455" y="109">runtime + profile</text>

  <rect class="allow" x="745" y="45" width="290" height="80"/>
  <text class="label" x="890" y="77">Proceed locally</text>
  <text class="small" x="890" y="101">file tools; git status/diff/log</text>

  <rect class="ask" x="745" y="200" width="290" height="90"/>
  <text class="label" x="890" y="232">Ask human</text>
  <text class="small" x="890" y="255">other shell/MCP calls;</text>
  <text class="small" x="890" y="274">outside-workspace paths</text>

  <rect class="deny" x="745" y="365" width="290" height="75"/>
  <text class="label" x="890" y="397">Deny</text>
  <text class="small" x="890" y="421">repeated doom loop</text>

  <rect class="ask" x="325" y="510" width="260" height="85"/>
  <text class="label" x="455" y="542">Human effect gate</text>
  <text class="small" x="455" y="566">publish, deploy, message,</text>
  <text class="small" x="455" y="585">account or remote write</text>

  <rect class="deny" x="55" y="510" width="210" height="85"/>
  <text class="label" x="160" y="545">Reject or defer</text>
  <text class="small" x="160" y="570">no external effect</text>

  <rect class="allow" x="650" y="510" width="300" height="85"/>
  <text class="label" x="800" y="542">Bounded execution</text>
  <text class="small" x="800" y="566">perform one approved action,</text>
  <text class="small" x="800" y="585">then report the result</text>

  <path class="line" d="M 285 90 H 325"/>
  <path class="line" d="M 585 90 H 745"/>
  <text class="small" x="665" y="75">local</text>
  <path class="line" d="M 535 125 L 745 225"/>
  <text class="small" x="642" y="162">ask</text>
  <path class="line" d="M 500 137 L 745 382"/>
  <text class="small" x="640" y="286">doom loop</text>
  <path class="line" d="M 455 140 V 510"/>
  <text class="small" x="520" y="335">external effect</text>
  <path class="line" d="M 325 553 H 265"/>
  <path class="line" d="M 585 553 H 650"/>
</svg>
